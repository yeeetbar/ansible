---

- hosts: all
  become: true
  tasks:

  - name: install apache2
    dnf:
      name: httpd

  - name: start httpd apache
    service: 
      name: httpd
      state: started
  
  - name: create user yeeet
    tags: always
    user:
      name: yeeet
      groups: bar

  - name: add ssh key to yeeet
    tags: always
    authorized_key:
      user: yeeet
      key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDAiX3mNQfr0stG6APHMC/6VuG/W1rBcH3DQqu2Irt0r ansible"
  
  - name: add sudo to user
    tags: always
    copy:  
      dest: /etc/sudoers.d/yeeet
      content: "yeeet ALL=(ALL) NOPASSWD: ALL"
      owner: root
      group: root
      mode: 0440

